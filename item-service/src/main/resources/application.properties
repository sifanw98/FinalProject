spring.application.name=item-service

# Database Configuration
# spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/itemsdb
# diff port on localhost
spring.datasource.url=jdbc:mysql://localhost:3307/itemsdb
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MongoDB Configuration
#spring.data.mongodb.uri=mongodb://${MONGO_HOST:localhost}:27017/items
spring.data.mongodb.uri=mongodb://localhost:27017/items

# Kafka Configuration
#spring.kafka.bootstrap-servers=${KAFKA_HOST:kafka}:9092
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=item-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.producer.properties.acks=all

# SpringDoc/Swagger Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

#Logging Configuration
logging.level.root=INFO
logging.level.org.springframework.kafka=DEBUG